services:
  mock-openai-api:
    build: .
    image: zerob13/mock-openai-api:1.0.6
    container_name: mock-openai-api
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "127.0.0.1:3001:3001"
    volumes:
      - mock-openai-data:/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - ADMIN_PORT=3001
      - ADMIN_HOST=0.0.0.0
      - ADMIN_TOKEN=${ADMIN_TOKEN:?Set ADMIN_TOKEN before starting the admin console}
      - DATA_DIR=/data
      - VERBOSE=false
      - TZ=UTC
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (res) => { res.statusCode === 200 ? process.exit(0) : process.exit(1); }).on('error', () => process.exit(1));"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Add nginx reverse proxy for production
  # nginx:
  #   image: nginx:alpine
  #   container_name: mock-openai-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - mock-openai-api

networks:
  default:
    name: mock-openai-network

volumes:
  mock-openai-data:
